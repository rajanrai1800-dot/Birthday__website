<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Gallery 💖</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #121212;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
    }

    h1 { font-family: 'Pacifico', cursive; color: #ff4b5c; margin-top: 10px; }

    .gallery-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      width: 100%;
      max-width: 500px;
      margin-top: 20px;
    }

    .photo-item {
      position: relative;
      overflow: hidden;
      border-radius: 15px;
      height: 200px;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .photo-item:nth-child(5) { grid-column: span 2; }

    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
      display: block;
    }

    .photo-item:hover img { transform: scale(1.1); }

    .message-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .message-content {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      padding: 30px;
      border-radius: 25px;
      border: 1px solid rgba(255, 75, 92, 0.5);
      max-width: 80%;
      text-align: center;
      animation: popUp 0.3s ease-out;
    }

    @keyframes popUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .close-btn {
      margin-top: 20px;
      background: #ff4b5c;
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
    }

    .nav-btns { display: flex; gap: 10px; margin-bottom: 20px; z-index: 100; }
    .nav-btns button { padding: 10px 20px; border-radius: 20px; border: none; cursor: pointer; font-weight: 600; }
  </style>
</head>
<body>

<div style="display: flex; gap: 10px; margin-bottom: 20px; z-index: 100;">
  <button onclick="window.location.href='index.html'" style="padding: 10px 20px; border-radius: 20px; border: none; background: #ff4b5c; color: white; cursor: pointer; font-weight: 600;">
    🏠 Back to Home
  </button>

  <button onclick="window.location.href='propose.html'" style="padding: 10px 20px; border-radius: 20px; border: none; background: white; color: #ff4b5c; cursor: pointer; font-weight: 600;">
    🎉 Go to Party!
  </button>
</div>


<h1>Our Memories 📸</h1>
<p style="opacity: 0.8;">Tap a photo to see our story</p>

<div class="gallery-container">
  <div class="photo-item" onclick="showMsg('Jhanma din ko dheari dheari subhakamana mero paryo vanda paryo manxey lai! ☀️')">
    <img src="4.jpg" alt="Memory 1">
  </div>
  <div class="photo-item" onclick="showMsg('Babe temi sanga mero yo first birthday hoo . 💖')">
    <img src="8.jpg" alt="Memory 2">
  </div>
  <div class="photo-item" onclick="showMsg('Babe yasplai ko mero birthday temi aayerw khas vako xa :)! 🚀')">
    <img src="2.jpg" alt="Memory 3">
  </div>
  <div class="photo-item" onclick="showMsg('Your are so amazing for me and loving me babe . ✨')">
    <img src="1.jpg" alt="Memory 4"> 
  </div>
  <div class="photo-item" onclick="showMsg('Happy Birthday! babe I love you! so much 🎂')">
    <img src="3.jpg" alt="Memory 5">
  </div>
</div>

<div id="msgOverlay" class="message-overlay" onclick="closeMsg()">
  <div class="message-content" onclick="event.stopPropagation()">
    <h2 id="popupText" style="font-weight: 300; line-height: 1.4; color: white; margin: 0;"></h2>
    <button class="close-btn" onclick="closeMsg()">Close</button>
  </div>
</div>

<audio id="mySong" loop><source src="music42.mp3" type="audio/mpeg"></audio>

<script>
  const song = document.getElementById('mySong');
  function playMusic() { song.play().catch(() => {}); }

  function showMsg(text) {
    playMusic(); 
    document.getElementById('popupText').innerText = text;
    document.getElementById('msgOverlay').style.display = 'flex';
  }

  function closeMsg() { document.getElementById('msgOverlay').style.display = 'none'; }
</script>

</body>
</html>
